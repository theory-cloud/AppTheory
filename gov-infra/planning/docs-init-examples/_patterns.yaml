patterns:
  api_snapshots_first:
    name: "Treat API snapshots as the public interface source of truth"
    problem: "Human docs can drift from exported symbols across Go, TypeScript, and Python."
    solution: "Use api-snapshots/go.txt, api-snapshots/ts.txt, and api-snapshots/py.txt as release-gated evidence before publishing API docs."
    correct_example: |
      # CORRECT
      ./scripts/update-api-snapshots.sh
      ./scripts/verify-api-snapshots.sh
    anti_patterns:
      - name: "Documenting symbols not present in snapshots"
        why: "This creates hallucinated APIs and breaks migration safety."
        incorrect_example: |
          # INCORRECT
          # Add docs for a new exported function before snapshot updates.
        consequences:
          - "Users depend on interfaces that are not actually exported"
          - "Cross-language docs drift"

  thin_lambda_entrypoint:
    name: "Keep Lambda handlers thin and delegate dispatch"
    problem: "Manual event-shape branching is brittle and drifts from the runtime contract."
    solution: "Delegate untyped events to HandleLambda/handleLambda/handle_lambda."
    correct_example: |
      # CORRECT (Go)
      func handler(ctx context.Context, event json.RawMessage) (any, error) {
        return app.HandleLambda(ctx, event)
      }
    anti_patterns:
      - name: "Hand-rolled shape detection"
        why: "Custom dispatch misses supported triggers and diverges across languages."
        incorrect_example: |
          # INCORRECT
          if event.RequestContext.HTTP.Method != "" {
            return app.ServeAPIGatewayV2(ctx, parsed)
          }
        consequences:
          - "Unhandled event shapes"
          - "Parity regressions"

  strict_route_registration:
    name: "Use normal fail-closed route registration"
    problem: "Invalid patterns, duplicate method/path pairs, and nil/undefined/None handlers must fail during setup."
    solution: "Use normal fluent registration and run startup tests that construct every route."
    correct_example: |
      # CORRECT
      app.Get("/users/{id}", h)
    anti_patterns:
      - name: "Assuming invalid routes will always error"
        why: "Compatibility behavior can hide invalid route declarations."
        incorrect_example: |
          # INCORRECT
          app.Get("/{proxy+}/x", h)
        consequences:
          - "Unexpected 404 responses"

  sanitize_before_logging:
    name: "Sanitize payloads before logging"
    problem: "Import and event payloads may contain sensitive data or control characters."
    solution: "Use sanitization helpers before writing logs."
    correct_example: |
      # CORRECT
      msg := sanitization.SanitizeLogString("import\nstart")
      logger.Info(msg)
    anti_patterns:
      - name: "Logging raw payload bodies"
        why: "Can leak PCI/PII and produce unsafe logs."
        incorrect_example: |
          # INCORRECT
          logger.Info("payload", map[string]any{"body": string(raw)})
        consequences:
          - "Sensitive data exposure"

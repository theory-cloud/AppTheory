concepts:
  apptheory:
    type: framework
    language: multi
    purpose: "Cross-language AWS Lambda runtime contract for Go, TypeScript, and Python."
    tagline: "One runtime contract with snapshot-backed drift prevention."
    provides:
      - "App container and routing primitives across Go/TypeScript/Python"
      - "Universal Lambda dispatch entrypoints for HTTP, queues, streams, and WebSockets"
      - "Deterministic local test environments: testkit.New(), createTestEnv(), create_test_env()"
    requires:
      - "Go 1.26.x (toolchain go1.26.1 from go.mod)"
      - "Node.js >=24 for ts/ and cdk/ package workflows"
      - "Python >=3.14 for py/ package workflows"
    use_when:
      - "You need equivalent runtime behavior across Go, TypeScript, and Python services."
      - "You need release-gated API drift controls using snapshots."
    dont_use_when:
      - "You need a non-AWS, general-purpose web framework with no Lambda adapter focus."

  canonical_docs_root:
    type: documentation_contract
    purpose: "Define the canonical KnowledgeTheory source surface for external docs."
    provides:
      - "Canonical root at docs/"
      - "Fixed ingestible docs plus sanctioned optional ingestible surfaces"
      - "Explicit exclusion of non-canonical roots from ingestible guidance"
    configuration:
      - "docs/README.md"
      - "docs/_contract.yaml"
      - "docs/migration/**"
      - "docs/cdk/**"

  public_interface_sources:
    type: source_of_truth
    purpose: "Authoritative evidence for AppTheory external interfaces."
    provides:
      - "api-snapshots/go.txt"
      - "api-snapshots/ts.txt"
      - "api-snapshots/py.txt"
      - "docs/api-reference.md"
      - "cdk/.jsii (for CDK construct surface)"
    failure_modes:
      - "Documentation drift when snapshot updates are skipped after export changes."
      - "UNKNOWN: interface stability for symbols not yet present in snapshots."

  migration_surface:
    type: workflow
    purpose: "Move Lift or raw Lambda handlers to AppTheory with parity-focused checks."
    provides:
      - "Lift migration path via docs/migration/from-lift.md"
      - "Go migration helper CLI at cmd/lift-migrate (flags include -root and -apply)"
      - "Validation gates via ./scripts/verify-contract-tests.sh and make rubric"
    failure_modes:
      - "Migrated behavior can drift if contract fixtures and snapshots are not updated together."

# =============================================================
# AppTheory · GitHub Pages — Theory Cloud Docs
#
# Builds the Jekyll site under docs/ and deploys it to GitHub Pages.
#
# TRIGGER POLICY (aligned with the repo's publishing-workflow pattern):
#   - release.yml / release-pr.yml ........................ triggers on `main`
#   - prerelease.yml / prerelease-pr.yml .................. triggers on `premain`
#   - theorycloud-apptheory-subtree-publish.yml ........... triggers on `premain` AND `main`
#   - pages.yml (this file) ............................... triggers on `staging` ONLY
#
# Pages publish is the *narrowest* of the publish workflows: it never fires
# from `premain`, `main`, pull requests, or feature branches. The GitHub
# Pages environment is protected to allow deployments from `staging` only,
# so the site reflects the integration docs line. Defensive
# `if: github.ref == 'refs/heads/staging'` guards on every job make accidental
# non-staging runs (e.g. via a manual workflow_dispatch from another branch) a
# no-op.
#
# This workflow is independent of release.yml / prerelease.yml /
# quality-gates / contract-tests — it never publishes packages, never mutates
# tags, and never touches the release manifests.
# =============================================================
name: pages

on:
  # Staging is the only branch allowed to publish the Pages site.
  push:
    branches: [staging]
  # Manual re-deploy (e.g. after rotating the Pages environment, or to
  # republish after a docs-only fix that doesn't justify a new commit).
  # Defensive `if:` guards still enforce staging-only at the job level.
  workflow_dispatch:

# Default workflow token stays read-only. Pages/id-token privileges are
# granted only to the deploy job after the docs build artifact exists.
permissions:
  contents: read

# Coalesce in-flight deploys: if a second `staging` push lands before the
# previous deploy finishes, queue it (don't cancel) so we never skip a
# commit's publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Jekyll site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BUNDLE_DEPLOYMENT: "true"
      BUNDLE_FROZEN: "true"
      BUNDLE_PATH: vendor/bundle
    # Belt-and-suspenders: even if someone invokes workflow_dispatch from
    # a non-staging ref, the job no-ops rather than building stale content.
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: docs

      - name: Jekyll build
        working-directory: docs
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll build \
            --source . \
            --destination ./_site \
            --baseurl ""

      - name: Verify custom-domain root paths
        working-directory: docs
        run: |
          if grep -R -nE --include='*.html' '(href|src)="/(AppTheory|apptheory)/' ./_site; then
            echo "Found root-relative links with the repository path; custom-domain assets must resolve from /." >&2
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs/_site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    if: github.ref == 'refs/heads/staging'
    environment:
      name: github-pages
      url: https://apptheory.theorycloud.ai/
    steps:
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - staging
      - main
      - premain
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  release-train-promotion:
    name: Release train promotion gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.sha }}
      - name: Verify release train promotion path
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if scripts/verify-release-train-promotion.sh --help | grep -q -- "--head-sha"; then
            scripts/verify-release-train-promotion.sh \
              --base "${PR_BASE_REF}" \
              --head "${PR_HEAD_REF}" \
              --base-ref HEAD \
              --head-sha "${PR_HEAD_SHA}" \
              --github-repository "${GITHUB_REPOSITORY}" \
              --github-head-repository "${PR_HEAD_REPOSITORY}"
            exit 0
          fi

          if [[ ! "${PR_HEAD_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "release-train-promotion: FAIL (pull request head SHA is invalid)"
            exit 1
          fi

          pr_head_data_ref="refs/remotes/origin/pr-head-witness/${PR_HEAD_SHA}"
          case "${PR_BASE_REF}:${PR_HEAD_REF}" in
            premain:staging|main:premain|staging:main)
              git fetch --no-tags origin \
                "+refs/heads/${PR_HEAD_REF}:refs/remotes/origin/${PR_HEAD_REF}"
              trusted_head_sha="$(git rev-parse "refs/remotes/origin/${PR_HEAD_REF}^{commit}")"
              if [[ "${trusted_head_sha}" != "${PR_HEAD_SHA}" ]]; then
                echo "release-train-promotion: FAIL (event head does not match trusted ${PR_HEAD_REF})"
                echo "trusted=${trusted_head_sha}"
                echo "event=${PR_HEAD_SHA}"
                exit 1
              fi
              git update-ref "${pr_head_data_ref}" "${trusted_head_sha}"
              ;;
            staging:staging|staging:premain)
              scripts/verify-release-train-promotion.sh \
                --base "${PR_BASE_REF}" \
                --head "${PR_HEAD_REF}" \
                --base-ref HEAD
              exit 0
              ;;
            staging:*)
              git fetch --no-tags origin \
                "+refs/heads/main:refs/remotes/origin/main"
              ancestor_sha="$(git rev-parse "refs/remotes/origin/main^{commit}")"
              python3 - "${PR_HEAD_REPOSITORY}" "${ancestor_sha}" "${PR_HEAD_SHA}" <<'PY'
          import json
          import os
          import re
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          repository, ancestor_sha, head_sha = sys.argv[1:]

          def fail(message: str) -> None:
              print(f"release-train-promotion: FAIL ({message})")
              raise SystemExit(1)

          if not re.fullmatch(r"[0-9a-f]{40}", ancestor_sha):
              fail("ancestor SHA is invalid")
          if not re.fullmatch(r"[0-9a-f]{40}", head_sha):
              fail("pull request head SHA is invalid")
          if not re.fullmatch(r"[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+", repository):
              fail("GitHub repository must be in owner/name form")

          token = os.environ.get("GITHUB_TOKEN")
          if not token:
              fail("GITHUB_TOKEN is required to verify PR head ancestry without fetching it")

          owner, repo = repository.split("/", 1)
          api_base = os.environ.get("GITHUB_API_URL", "https://api.github.com").rstrip("/")
          url = (
              f"{api_base}/repos/"
              f"{urllib.parse.quote(owner, safe='')}/"
              f"{urllib.parse.quote(repo, safe='')}/"
              f"compare/{ancestor_sha}...{head_sha}"
          )
          request = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "User-Agent": "apptheory-release-train-verifier",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )

          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  payload = json.load(response)
          except urllib.error.HTTPError as exc:
              detail = exc.read(512).decode("utf-8", errors="replace").strip()
              fail(f"GitHub API request failed with HTTP {exc.code}: {detail or exc.reason}")
          except urllib.error.URLError as exc:
              fail(f"GitHub API request failed: {exc.reason}")

          merge_base = payload.get("merge_base_commit", {}).get("sha", "")
          if payload.get("status") not in {"ahead", "identical"} or merge_base.lower() != ancestor_sha:
              fail(
                  "staging PR branch does not contain the current main baseline; "
                  "merge origin/main into the PR branch before targeting staging"
              )
          PY
              git update-ref "${pr_head_data_ref}" "${ancestor_sha}"
              ;;
            *)
              scripts/verify-release-train-promotion.sh \
                --base "${PR_BASE_REF}" \
                --head "${PR_HEAD_REF}" \
                --base-ref HEAD
              exit 0
              ;;
          esac

          scripts/verify-release-train-promotion.sh \
            --base "${PR_BASE_REF}" \
            --head "${PR_HEAD_REF}" \
            --base-ref HEAD \
            --head-ref "${pr_head_data_ref}"

  prerelease-readiness:
    name: Prerelease readiness (staging → premain)
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'premain' && github.event.pull_request.head.ref == 'staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Verify user-facing conventional commits exist
        run: |
          set -euo pipefail

          git fetch origin premain staging --force
          range="origin/premain..origin/staging"

          echo "Checking commits in ${range}..."
          # Do not pipe directly into grep -q under pipefail: grep exits as soon
          # as it finds a match, which can SIGPIPE git log and make a matching
          # commit look like a failed readiness check.
          commit_subjects="$(git log --format=%s "${range}")"
          if grep -Eq '^(feat|fix|perf)(\([^)]+\))?(!)?: ' <<<"${commit_subjects}"; then
            echo "prerelease-ready: OK"
            exit 0
          fi

          echo "prerelease-ready: FAIL"
          echo "No user-facing conventional commits (feat:/fix:/perf:) found in ${range}."
          echo "release-please will skip, so no new vX.Y.Z-rc tag will be cut."
          echo
          echo "Commit subjects:"
          printf '%s\n' "${commit_subjects}" || true
          exit 1

  version-alignment:
    name: Version alignment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify versions match VERSION
        run: scripts/verify-version-alignment.sh
      - name: Verify branch release version state
        run: scripts/verify-branch-version-sync.sh

  go:
    name: Go (test + vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: "1.26.3"
      - name: Test and vet
        run: scripts/verify-go.sh

  ts:
    name: TypeScript (npm pack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
      - name: Build tarball
        run: scripts/verify-ts-pack.sh

  py:
    name: Python (build wheel + sdist)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.14"
      - name: Build wheel + sdist
        run: scripts/verify-python-build.sh

  builds:
    name: Verify deterministic builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: "1.26.3"
      - name: Install golangci-lint (pinned)
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.9.0
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.14"
      - name: Build twice and compare checksums
        run: scripts/verify-builds.sh

  contract-tests:
    name: Contract tests (fixtures)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: "1.26.3"
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.14"
      - name: Verify API snapshots
        run: scripts/verify-api-snapshots.sh
      - name: Run contract tests
        run: scripts/verify-contract-tests.sh

  rubric:
    name: Rubric (full gate set)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: "1.26.3"
      - name: Install golangci-lint (pinned)
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.9.0
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.14"
      - name: Run full rubric
        run: make rubric

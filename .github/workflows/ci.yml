name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - staging
      - main
      - premain
  workflow_dispatch:
    inputs:
      run_full_rubric:
        description: "Run Rubric (full gate set)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  release-train-promotion:
    name: Release train promotion gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted release gate code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
          # Run verifier code from the protected staging lane, never from PR-head content.
          ref: refs/heads/staging
      - name: Verify release train promotion path
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          base_ref_args=()
          pr_title_args=()
          if scripts/verify-release-train-promotion.sh --help | grep -q -- "--pr-title"; then
            pr_title_args=(--pr-title "${PR_TITLE}")
          fi

          release_ref_depth_args=()
          if [[ "$(git rev-parse --is-shallow-repository)" == "true" ]]; then
            release_ref_depth_args=(--unshallow)
          fi
          git fetch --no-tags "${release_ref_depth_args[@]}" origin \
            "+refs/heads/staging:refs/remotes/origin/staging" \
            "+refs/heads/premain:refs/remotes/origin/premain" \
            "+refs/heads/main:refs/remotes/origin/main"

          case "${PR_BASE_REF}" in
            staging|premain|main)
              base_ref_args=(--base-ref "refs/remotes/origin/${PR_BASE_REF}")
              ;;
          esac

          scripts/verify-release-train-promotion.sh \
            --base "${PR_BASE_REF}" \
            --head "${PR_HEAD_REF}" \
            "${base_ref_args[@]}" \
            --head-sha "${PR_HEAD_SHA}" \
            --github-repository "${GITHUB_REPOSITORY}" \
            --github-head-repository "${PR_HEAD_REPOSITORY}" \
            "${pr_title_args[@]}"

  release-security-gates:
    name: Release/security gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify release/security invariants
        run: |
          bash scripts/verify-branch-release-supply-chain.sh
          bash scripts/verify-release-train-promotion.sh --self-test
          bash scripts/verify-ci-rubric-enforced.sh
          bash scripts/verify-release-workflows.sh
          bash scripts/verify-release-cycle.sh
      - name: Verify runtime floor claims
        run: bash scripts/verify-runtime-floor-claims.sh

  prerelease-readiness:
    name: Prerelease readiness (staging → premain)
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'premain' && github.event.pull_request.head.ref == 'staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Verify user-facing conventional commits exist
        run: |
          set -euo pipefail

          git fetch origin premain staging --force
          range="origin/premain..origin/staging"

          echo "Checking commits in ${range}..."
          # Do not pipe directly into grep -q under pipefail: grep exits as soon
          # as it finds a match, which can SIGPIPE git log and make a matching
          # commit look like a failed readiness check.
          commit_subjects="$(git log --format=%s "${range}")"
          if grep -Eq '^(feat|fix|perf)(\([^)]+\))?(!)?: ' <<<"${commit_subjects}"; then
            echo "prerelease-ready: OK"
            exit 0
          fi

          echo "prerelease-ready: FAIL"
          echo "No user-facing conventional commits (feat:/fix:/perf:) found in ${range}."
          echo "release-please will skip, so no new vX.Y.Z-rc tag will be cut."
          echo
          echo "Commit subjects:"
          printf '%s\n' "${commit_subjects}" || true
          exit 1

  version-alignment:
    name: Version alignment
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false || (github.event.pull_request.head.ref != 'release-please--branches--premain' && github.event.pull_request.head.ref != 'release-please--branches--main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify versions match VERSION
        run: scripts/verify-version-alignment.sh
      - name: Verify branch release version state
        run: scripts/verify-branch-version-sync.sh

  go:
    name: Go (test + vet)
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false || (github.event.pull_request.head.ref != 'release-please--branches--premain' && github.event.pull_request.head.ref != 'release-please--branches--main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: "1.26.4"
          cache: true
          cache-dependency-path: go.sum
      - name: Test and vet
        run: scripts/verify-go.sh

  ts:
    name: TypeScript (npm pack)
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false || (github.event.pull_request.head.ref != 'release-please--branches--premain' && github.event.pull_request.head.ref != 'release-please--branches--main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ts/package-lock.json
      - name: Verify checked-in dist drift
        run: scripts/verify-ts-dist-drift.sh
      - name: Build tarball
        run: scripts/verify-ts-pack.sh

  py:
    name: Python (build wheel + sdist)
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false || (github.event.pull_request.head.ref != 'release-please--branches--premain' && github.event.pull_request.head.ref != 'release-please--branches--main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: |
            py/pyproject.toml
            py/requirements-build.txt
      - name: Build wheel + sdist
        run: scripts/verify-python-build.sh

  builds:
    name: Verify deterministic builds
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: "1.26.4"
          cache: true
          cache-dependency-path: go.sum
      - name: Install golangci-lint (pinned)
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.9.0
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            ts/package-lock.json
            cdk/package-lock.json
            examples/cdk/*/package-lock.json
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: |
            py/pyproject.toml
            py/requirements-build.txt
            py/requirements-lint.txt
            cdk/requirements-build.txt
      - name: Build twice and compare checksums
        run: scripts/verify-builds.sh

  cdk-go-drift:
    name: CDK Go binding drift
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false || (github.event.pull_request.head.ref != 'release-please--branches--premain' && github.event.pull_request.head.ref != 'release-please--branches--main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: "1.26.4"
          cache: true
          cache-dependency-path: go.sum
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: cdk/package-lock.json
      - name: Verify cdk-go generated binding drift
        run: scripts/verify-cdk-go-drift.sh

  contract-tests:
    name: Contract tests (fixtures)
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false || (github.event.pull_request.head.ref != 'release-please--branches--premain' && github.event.pull_request.head.ref != 'release-please--branches--main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: "1.26.4"
          cache: true
          cache-dependency-path: go.sum
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ts/package-lock.json
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: py/pyproject.toml
      - name: Verify API snapshots
        run: scripts/verify-api-snapshots.sh
      - name: Run contract tests
        run: scripts/verify-contract-tests.sh

  rubric:
    name: Rubric (full gate set)
    if: (github.event_name == 'workflow_dispatch' && (inputs.run_full_rubric == true || inputs.run_full_rubric == 'true')) || (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'staging')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: "1.26.4"
          cache: true
          cache-dependency-path: go.sum
      - name: Install golangci-lint (pinned)
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.9.0
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            ts/package-lock.json
            cdk/package-lock.json
            examples/cdk/*/package-lock.json
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: |
            py/pyproject.toml
            py/requirements-build.txt
            py/requirements-lint.txt
            cdk/requirements-build.txt
      - name: Run full rubric
        run: make rubric

patterns:
  api_snapshot_as_source_of_truth:
    name: "Use API snapshots as the canonical external surface"
    problem: "Human docs can lag behind exported package or module interfaces."
    solution: "Treat api-snapshots/go.txt, api-snapshots/ts.txt, and api-snapshots/py.txt as release-gated public API truth."
    correct_example: |
      # CORRECT: update snapshots and docs together after external API changes
      ./scripts/update-api-snapshots.sh
      make rubric
    anti_patterns:
      - name: "Documenting unconfirmed exports"
        why: "Invented interfaces break trust and migration safety."
        incorrect_example: |
          # INCORRECT
          # Add docs for an API before it appears in api-snapshots/*
        consequences:
          - "No hallucinated APIs violation"
          - "Broken client integrations"

  universal_lambda_dispatch:
    name: "Delegate mixed AWS trigger handling to the runtime dispatcher"
    problem: "Manual event-shape branching in Lambda handlers drifts across languages and misses edge event types."
    solution: "Use AppTheory dispatcher entrypoints (HandleLambda, handleLambda, handle_lambda) so routing behavior stays contract-tested, including standard AppSync resolver event detection."
    correct_example: |
      # CORRECT: keep the Lambda entrypoint thin and delegate dispatch.
      func handler(ctx context.Context, event json.RawMessage) (any, error) {
        return app.HandleLambda(ctx, event)
      }
    anti_patterns:
      - name: "Hand-rolled shape detection"
        why: "Custom branching diverges from fixture-backed dispatch behavior."
        incorrect_example: |
          # INCORRECT: partial/manual branching that misses supported event variants
          if event.requestContext.http != nil {
            return app.ServeAPIGatewayV2(ctx, parsed)
          }
        consequences:
          - "Cross-language behavior drift"
          - "Unhandled production event shapes"

  appsync_router_adaptation:
    name: "Route AppSync resolvers through the normal AppTheory router"
    problem: "Treating AppSync as a bespoke handler path duplicates request adaptation and bypasses the runtime's typed resolver context."
    solution: "Register routes that match the GraphQL field name (`Query` and `Subscription` -> `GET /fieldName`, `Mutation` -> `POST /fieldName`) and read resolver metadata from the typed AppSync context. Use the explicit AppSync entrypoint for AppSync-only Lambdas, or keep mixed-trigger handlers on the universal dispatcher."
    correct_example: |
      # CORRECT: let the runtime adapt Query.getThing into GET /getThing.
      app.Get("/getThing", func(ctx *apptheory.Context) (*apptheory.Response, error) {
        appsync := ctx.AsAppSync()
        return apptheory.JSON(200, map[string]any{"field": appsync.FieldName})
      })
    anti_patterns:
      - name: "Handling GraphQL fields outside the router"
        why: "Bypassing AppTheory routing loses the shared request model, typed AppSync context, and tested error projection."
        incorrect_example: |
          # INCORRECT
          switch event.Info.FieldName {
          case "getThing":
            // bespoke resolver handling here
          }
        consequences:
          - "Cross-language AppSync drift"
          - "Inconsistent error and metadata handling"

  headers_canonicalization:
    name: "Treat headers case-insensitively and assert lowercase response keys"
    problem: "Header-map casing assumptions cause brittle tests and inconsistent client behavior."
    solution: "Read headers case-insensitively and write or verify lowercase response header keys."
    correct_example: |
      # CORRECT (Go)
      reqID := ctx.Header("X-Request-Id")
      resp.Headers["x-request-id"] = []string{reqID}
    anti_patterns:
      - name: "Asserting mixed-case response keys"
        why: "AppTheory normalizes response header keys for parity."
        incorrect_example: |
          # INCORRECT
          assert.Equal(t, "abc", resp.Headers["X-Request-Id"])
        consequences:
          - "False-negative tests"
          - "Confusion during migration"

  strict_route_registration:
    name: "Use normal fail-closed route registration"
    problem: "Invalid route patterns, duplicate method/path pairs, and nil/undefined/None handlers must fail during setup instead of drifting into runtime 404s."
    solution: "Use normal fluent registration and run startup tests that construct every route."
    correct_example: |
      # CORRECT (Go): normal registration fails closed during setup
      app.Get("/users/{id}", handleUser)
    anti_patterns:
      - name: "Assuming all routes register successfully"
        why: "Ignoring setup failures can block startup or leave tests blind to invalid route tables."
        incorrect_example: |
          # INCORRECT
          app.Get("/{proxy+}/x", handleUser)
        consequences:
          - "Unexpected 404s"
          - "Slow debugging cycles"

  mcp_deployment_shape:
    name: "Choose the MCP deployment shape by client and transport requirements"
    problem: "Bedrock AgentCore and Claude Remote MCP do not have the same transport, streaming, or OAuth discovery requirements."
    solution: "Use `AppTheoryMcpServer` on HTTP API v2 for AgentCore-style POST-only deployments. Use `AppTheoryRemoteMcpServer` plus `AppTheoryMcpProtectedResource` when you need Streamable HTTP `POST/GET/DELETE /mcp`, OAuth protected-resource discovery, and a streaming-capable REST API v1 edge. Durable replay still requires application code to provide a persistent `StreamStore`."
    correct_example: |
      # CORRECT: choose the Remote MCP stack when the client needs resumable SSE.
      new AppTheoryRemoteMcpServer(stack, "RemoteMcp", {
        handler,
        enableSessionTable: true,
      })
    anti_patterns:
      - name: "Using the AgentCore construct as a drop-in Remote MCP edge"
        why: "HTTP API v2 POST-only deployments do not provide the same transport surface or streaming behavior as the Remote MCP stack."
        incorrect_example: |
          # INCORRECT
          new AppTheoryMcpServer(stack, "McpServer", { handler })
        consequences:
          - "Missing GET /mcp and DELETE /mcp support"
          - "Remote-MCP reconnect and replay gaps"

  sanitize_before_logging:
    name: "Sanitize payloads before logging"
    problem: "Import pipelines often handle PCI/PII; logging raw payloads leaks sensitive data and may enable log forging."
    solution: "Sanitize log strings and structured fields, and log sanitized JSON or XML instead of raw payload dumps."
    correct_example: |
      # CORRECT (Go)
      msg := sanitization.SanitizeLogString("import\nstart")
      logger.Info(msg, sanitization.SanitizeFieldValue("body", payload))
    anti_patterns:
      - name: "Logging raw payloads"
        why: "Raw payloads can contain PAN, SSN, tokens, and untrusted control characters."
        incorrect_example: |
          # INCORRECT
          logger.Info("payload", map[string]any{"body": string(raw)})
        consequences:
          - "PCI/PII leakage"
          - "Log forging or broken log parsing"

  jobs_ledger_for_long_running_jobs:
    name: "Use the jobs ledger for long-running imports"
    problem: "Retries, partial failures, and concurrency make job status and idempotency bespoke and inconsistent across services."
    solution: "Use the jobs ledger primitives for job lifecycle, per-record status, leases, and idempotency."
    correct_example: |
      # CORRECT (pseudo-code)
      ledger.CreateJob(jobID, tenantID)
      ledger.AcquireLease(jobID, workerID, ttlSeconds)
      ledger.CreateIdempotencyRecord(jobID, recordKey)
      ledger.UpsertRecordStatus(jobID, recordID, "SUCCEEDED", nil)
      ledger.CompleteIdempotencyRecord(jobID, recordKey)
    anti_patterns:
      - name: "Relying on at-least-once triggers without idempotency"
        why: "Event sources and retries will produce duplicate deliveries."
        incorrect_example: |
          # INCORRECT
          processRecord(record)  # no idempotency guard
        consequences:
          - "Double processing"
          - "Inconsistent job state"

  lambda_microvm_golden_path:
    name: "Use the AppTheory MicroVM golden path end to end"
    problem: "MicroVM lifecycle, provider, controller, network, token, and session-state behavior drifts when teams hand-roll pieces around the framework."
    solution: "Use AppTheory lifecycle adapters, the constrained real MicroVM provider/controller, the TableTheory-shaped session registry, typed AppTheory CDK connector/image/controller constructs, and the AppTheory conformance harness together. Controller routes stay authorizer-protected and fail closed by default; EqualToAI/Host proof requires a consumer-run live harness."
    correct_example: |
      # CORRECT: compose the blessed AppTheory surfaces.
      AppTheoryMicrovmNetworkConnector -> AppTheoryMicrovmImage -> AppTheoryMicrovmController
      controller handler -> MicroVMRealController + TableTheoryMicroVMSessionRegistry
      lifecycle handlers -> MicroVMLifecycleAdapter
      conformance -> examples/microvm-conformance against a consumer-provided lab
    anti_patterns:
      - name: "Raw MicroVM control plane calls"
        why: "Raw SDK clients bypass AppTheory's constrained real operation envelope, sanitized errors, tenant binding, token safety, and registry validation."
        incorrect_example: |
          # INCORRECT
          lambdaClient.runMicrovm(rawRequest)
        consequences:
          - "Cross-language behavior drift"
          - "Unbounded AWS credential or bearer-token exposure"
      - name: "Unauthenticated controller routes"
        why: "The controller contract requires auth.required=true and default=deny; demo authorizers are not production proof."
        incorrect_example: |
          # INCORRECT
          new AppTheoryMicrovmController(stack, "Controller", { controller, microvmImage, egressNetworkConnectors })
        consequences:
          - "Fail-open controller access"
          - "Tenant-bound session state bypass"
      - name: "Ad-hoc session tables"
        why: "Controller/session routes must use the canonical TableTheory/DynamoDB pk/sk/ttl registry shape."
        incorrect_example: |
          # INCORRECT
          putItem({ id: sessionId, status: "ready" })
        consequences:
          - "Session lookup drift"
          - "TTL and tenant-bound key mismatch"
      - name: "Claiming live proof from local dry-run"
        why: "Local dry-run proves only harness readiness; live AWS and EqualToAI/Host proof require a consumer lab run."
        incorrect_example: |
          # INCORRECT
          ./scripts/verify-microvm-conformance-harness.sh  # described as live customer readiness
        consequences:
          - "Release-readiness overclaim"
          - "Customer workload proof boundary violation"

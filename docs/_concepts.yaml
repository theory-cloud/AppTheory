concepts:
  apptheory:
    type: framework
    language: multi
    purpose: "Cross-language serverless runtime contract for AWS Lambda apps in Go, TypeScript, and Python."
    tagline: "One runtime contract, three language SDKs, snapshot-backed drift prevention."
    provides:
      - "App container and routing primitives across Go/TypeScript/Python"
      - "AWS adapter entrypoints for HTTP, AppSync, event sources, and WebSockets"
      - "Deterministic testkit helpers for event building, time control, and ID control"
      - "Public API drift gates via api-snapshots/go.txt, api-snapshots/ts.txt, api-snapshots/py.txt"
    requires:
      - "Go 1.26.x toolchain for Go runtime development"
      - "Node.js 24+ for TypeScript and jsii/CDK workflows"
      - "Python 3.14+ for Python runtime workflows"
    use_when:
      - "You need equivalent Lambda runtime behavior across Go, TypeScript, and Python."
      - "You want contract tests and API snapshots to prevent cross-language drift."
    dont_use_when:
      - "You need a general-purpose web framework unrelated to AWS serverless adapters."

  canonical_docs_root:
    type: documentation_contract
    purpose: "Canonical external documentation root used by humans and AI ingestion."
    provides:
      - "Fixed ingestible docs under docs/"
      - "Contract-only docs under docs/_contract.yaml and docs/development-guidelines.md"
      - "Sanctioned optional ingestible docs under docs/migration/** and docs/cdk/**"
      - "Package-local docs under ts/docs/, py/docs/, and cdk/docs/ as secondary authoring surfaces, not the canonical external root"
    configuration:
      - docs/
      - docs/_contract.yaml
      - "ts/docs/ (secondary package-local docs)"
      - "py/docs/ (secondary package-local docs)"
      - "cdk/docs/ (secondary package-local docs)"
    failure_modes:
      - "Duplicate canonical claims across package-local docs create drift and conflicting navigation."

  public_contract_sources:
    type: source_of_truth
    purpose: "Authoritative external surface definitions used for docs updates and migration safety."
    provides:
      - "Go public exports snapshot: api-snapshots/go.txt"
      - "TypeScript public exports snapshot: api-snapshots/ts.txt"
      - "Python public exports snapshot: api-snapshots/py.txt"
      - "CDK construct manifest: cdk/.jsii"
      - "Human-readable interface map: docs/api-reference.md"
    failure_modes:
      - "If snapshots or jsii output are stale, docs can drift from published interfaces."

  runtime_tiers:
    type: concept
    purpose: "Runtime feature tiers: P0 core, P1 platform defaults, P2 production hooks."
    key_methods:
      - TierP0: "Minimal core surface."
      - TierP1: "Adds request-id, auth hooks, CORS, limits."
      - TierP2: "Adds observability, policy hooks, and rate limiting semantics."

  contract_tests:
    type: component
    purpose: "Fixture-backed cross-language contract tests for behavior parity."
    provides:
      - cross_language_parity
    configuration:
      - contract-tests/

  api_snapshots:
    type: component
    purpose: "Public API drift gate for Go, TypeScript, and Python."
    provides:
      - exported_surface_snapshots
    configuration:
      - api-snapshots/

  testkits:
    type: component
    purpose: "Deterministic test environments per language (clock, IDs, and AWS event builders)."
    provides:
      - deterministic_time
      - deterministic_ids
      - aws_event_builders

  universal_lambda_dispatch:
    type: component
    purpose: "Universal Lambda entrypoint that dispatches untyped AWS events to the correct adapter."
    key_methods:
      - HandleLambda: "Go universal dispatcher (json.RawMessage)."
      - handleLambda: "TypeScript universal dispatcher (unknown event)."
      - handle_lambda: "Python universal dispatcher (dict event)."
    provides:
      - event_shape_detection
      - appsync_resolver_detection
      - single_lambda_entrypoint

  appsync_resolvers:
    type: component
    purpose: "Direct Lambda resolver support that adapts standard AWS AppSync events into the normal AppTheory router."
    provides:
      - explicit_appsync_entrypoints
      - standard_resolver_event_detection
      - typed_appsync_context
      - resolver_payload_projection
      - lift_compatible_error_envelopes
      - deterministic_appsync_test_builders
    configuration:
      - runtime/aws_appsync.go
      - runtime/context.go
      - ts/src/internal/aws-appsync.ts
      - py/src/apptheory/aws_events.py
      - testkit/event_sources.go
      - ts/src/testkit.ts
      - py/src/apptheory/testkit.py
    related:
      - universal_lambda_dispatch
      - testkits
    docs:
      - docs/api-reference.md
      - docs/getting-started.md
      - docs/migration/appsync-lambda-resolvers.md
      - docs/cdk/appsync-lambda-resolvers.md

  limited_rate_limiting:
    type: component
    purpose: "DynamoDB-backed rate limiting (the limited feature set) with equivalent capabilities across languages."
    provides:
      - fixed_window_limits
      - sliding_window_limits
      - multi_window_limits
      - fail_open_or_closed
      - usage_stats
    configuration:
      - "DynamoDB table: rate-limits (default)"

  sanitization:
    type: component
    purpose: "Safe logging utilities (redaction + masking) intended to prevent sensitive data leaks in logs."
    provides:
      - sanitize_log_string
      - sanitize_structured_fields
      - sanitize_json
      - sanitize_xml
      - payment_xml_masking_patterns
    docs:
      - docs/features/sanitization.md

  jobs_ledger:
    type: component
    purpose: "TableTheory-backed job ledger primitives for long-running workflows (jobs, records, leases, and idempotency)."
    provides:
      - job_lifecycle_tracking
      - per_record_status
      - leases
      - idempotency
      - safe_error_envelopes
    configuration:
      - "DynamoDB: pk/sk schema (JOB#..., META/REC#/LOCK/REQ#...)"
    docs:
      - docs/features/jobs-ledger.md
      - examples/cdk/import-pipeline/README.md

  import_pipeline_support_pack:
    type: workflow
    purpose: "AWS-native import pipeline primitives (S3 ingest + job ledger + optional batch runner) intended to be assembled into production workloads."
    provides:
      - s3_ingest_front_door
      - job_and_record_auditing
      - per_record_workers
      - optional_batch_steps
      - safe_logging_defaults
    related:
      - jobs_ledger
      - sanitization
      - cdk_constructs
    docs:
      - examples/cdk/import-pipeline/README.md
      - docs/cdk/import-pipeline.md

  cdk_constructs:
    type: component
    purpose: "jsii CDK constructs that deploy AppTheory apps with consistent defaults."
    provides:
      - http_api_constructs
      - rest_api_constructs
      - mcp_server_constructs
      - import_pipeline_constructs
      - lambda_defaults
    configuration:
      - cdk/
      - docs/cdk/

  mcp_runtime:
    type: component
    purpose: "Expose MCP (Model Context Protocol) over Streamable HTTP for Bedrock AgentCore and remote-MCP integrations."
    provides:
      - streamable_http_transport
      - protocol_version_negotiation
      - jsonrpc_2_0_methods
      - tools_registry
      - resources_registry
      - prompts_registry
      - session_management
      - origin_validation
      - resumable_sse_progress_streaming
    configuration:
      - runtime/mcp/
      - runtime/oauth/
      - cdk/lib/mcp-server.ts
      - cdk/lib/remote-mcp-server.ts
    docs:
      - docs/integrations/agentcore-mcp.md
      - docs/integrations/mcp.md
      - docs/integrations/remote-mcp.md
      - docs/integrations/remote-mcp-autheory.md
      - docs/cdk/mcp-server-agentcore.md
      - docs/cdk/mcp-server-remote-mcp.md
      - docs/cdk/mcp-protected-resource.md

# _concepts.yaml - Machine-readable concept map for AppTheory
# This file is intentionally compact and versioned in git.

concepts:
  apptheory:
    type: framework
    language: multi
    purpose: "Cross-language serverless runtime contract for AWS Lambda apps (Go/TypeScript/Python)."
    provides:
      - routing
      - middleware
      - request_response_normalization
      - aws_event_adapters
      - deterministic_testing
      - drift_prevention
    requires:
      - aws_lambda
      - github_releases
    use_when:
      - "You need equivalent behavior across Go, TypeScript, and Python."
      - "You want fixture-backed contract tests to prevent drift."
    dont_use_when:
      - "You want a general-purpose web framework (templates/ORM/server)."

  tiers:
    type: concept
    purpose: "Runtime feature tiers: P0 core, P1 platform defaults, P2 production hooks."
    key_methods:
      - TierP0: "Minimal core surface."
      - TierP1: "Adds request-id, auth hooks, CORS, limits."
      - TierP2: "Adds observability/policy hooks and rate limiting semantics."

  contract_tests:
    type: component
    purpose: "Fixture-backed cross-language contract tests for behavior parity."
    provides:
      - cross_language_parity
    configuration:
      - contract-tests/

  api_snapshots:
    type: component
    purpose: "Public API drift gate for Go/TypeScript/Python."
    provides:
      - exported_surface_snapshots
    configuration:
      - api-snapshots/

  testkits:
    type: component
    purpose: "Deterministic test environments per language (clock + ids + event builders)."
    provides:
      - deterministic_time
      - deterministic_ids
      - aws_event_builders

  handle_lambda_dispatch:
    type: component
    purpose: "Universal Lambda entrypoint that dispatches untyped AWS events to the correct adapter."
    key_methods:
      - HandleLambda: "Go universal dispatcher (json.RawMessage)."
      - handleLambda: "TypeScript universal dispatcher (unknown event)."
      - handle_lambda: "Python universal dispatcher (dict event)."
    provides:
      - event_shape_detection
      - single_lambda_entrypoint

  limited_rate_limiting:
    type: component
    purpose: "DynamoDB-backed rate limiting (the `limited` feature set) with equivalent capabilities across languages."
    provides:
      - fixed_window_limits
      - sliding_window_limits
      - multi_window_limits
      - fail_open_or_closed
      - usage_stats
    configuration:
      - "DynamoDB table: rate-limits (default)"

  cdk_constructs:
    type: component
    purpose: "jsii CDK constructs that deploy AppTheory apps with consistent defaults."
    provides:
      - http_api_constructs
      - rest_api_constructs
      - lambda_defaults
    configuration:
      - cdk/

  sanitization:
    type: component
    purpose: "Safe logging utilities (redaction + masking) intended to prevent sensitive data leaks in logs."
    provides:
      - sanitize_log_string
      - sanitize_structured_fields
      - sanitize_json
      - sanitize_xml
      - payment_xml_masking_patterns
    docs:
      - docs/sanitization.md

  jobs_ledger:
    type: component
    purpose: "TableTheory-backed job ledger primitives for long-running workflows (jobs + records + leases + idempotency)."
    provides:
      - job_lifecycle_tracking
      - per_record_status
      - leases
      - idempotency
      - safe_error_envelopes
    configuration:
      - "DynamoDB: pk/sk schema (JOB#..., META/REC#/LOCK/REQ#...)"
    docs:
      - docs/jobs-ledger.md
      - cdk/docs/jobs-table.md
      - examples/cdk/import-pipeline/README.md

  import_pipeline_support_pack:
    type: workflow
    purpose: "AWS-native import pipeline primitives (S3 ingest + job ledger + optional batch runner) intended to be assembled into production workloads."
    provides:
      - s3_ingest_front_door
      - job_and_record_auditing
      - per_record_workers
      - optional_batch_steps
      - safe_logging_defaults
    related:
      - jobs_ledger
      - sanitization
      - cdk_constructs
    docs:
      - examples/cdk/import-pipeline/README.md
      - cdk/docs/s3-ingest.md
      - cdk/docs/eventbridge-rule-target.md
      - cdk/docs/jobs-table.md
      - cdk/docs/codebuild-job-runner.md

  mcp_gateway:
    type: component
    purpose: "Expose MCP (Model Context Protocol) over HTTP for Bedrock AgentCore tool integrations."
    provides:
      - jsonrpc_2_0_methods
      - tools_registry
      - resources_registry
      - prompts_registry
      - session_management
      - optional_sse_progress_streaming
    configuration:
      - runtime/mcp/
      - cdk/lib/mcp-server.ts
    docs:
      - docs/agentcore-mcp.md
      - docs/mcp.md
      - cdk/docs/mcp-server-agentcore.md

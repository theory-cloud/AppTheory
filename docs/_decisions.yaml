decisions:
  choose_entrypoint_shape:
    question: "How should Lambda handlers be wired when integrating AppTheory?"
    decision_tree:
      - condition: "The Lambda is dedicated to standard AWS AppSync resolver events."
        check: "Can the handler accept the AppSync resolver event type directly?"
        if_yes:
          choice: "Use the explicit AppSync entrypoint"
          reason: "ServeAppSync / serveAppSync / serve_appsync keeps the resolver contract obvious while still routing through the normal AppTheory router."
          example: |
            func handler(ctx context.Context, event apptheory.AppSyncResolverEvent) any {
              return app.ServeAppSync(ctx, event)
            }
        if_no:
          choice: "Use the universal dispatcher entrypoint"
          reason: "HandleLambda / handleLambda / handle_lambda still detect standard AppSync resolver events for mixed-trigger or generic handlers."
          example: |
            func handler(ctx context.Context, event json.RawMessage) (any, error) {
              return app.HandleLambda(ctx, event)
            }
      - condition: "The Lambda may receive multiple AWS trigger types (HTTP, queues, streams, or WebSockets)."
        check: "Can you delegate event detection to the runtime dispatcher?"
        if_yes:
          choice: "Use the universal dispatcher entrypoint"
          reason: "HandleLambda / handleLambda / handle_lambda is contract-tested for event-shape routing across runtimes."
          example: |
            func handler(ctx context.Context, event json.RawMessage) (any, error) {
              return app.HandleLambda(ctx, event)
            }
        if_no:
          choice: "Document the gap before custom branching"
          reason: "Manual branching is high drift risk and must be explicitly justified."
          example: |
            TODO: If a custom dispatcher is required, document unsupported event shapes and add parity tests.

  choose_mcp_deployment_shape:
    question: "Which MCP deployment shape should I choose?"
    decision_tree:
      - condition: "The client is Bedrock AgentCore or another POST-only MCP caller."
        check: "Do you only need the simpler HTTP API v2 edge and not Streamable HTTP replay semantics?"
        if_yes:
          choice: "Use AppTheoryMcpServer"
          reason: "It provisions the AgentCore-oriented POST /mcp edge with optional session storage and domain mapping."
          example: |
            new AppTheoryMcpServer(this, "McpServer", { handler })
        if_no:
          choice: "Use AppTheoryRemoteMcpServer plus AppTheoryMcpProtectedResource"
          reason: "Claude Remote MCP needs Streamable HTTP POST/GET/DELETE, OAuth protected-resource discovery, and a streaming-capable REST API v1 edge."
          example: |
            new AppTheoryRemoteMcpServer(this, "RemoteMcp", {
              handler,
              enableSessionTable: true,
            })
      - condition: "You enabled the Remote MCP stream table."
        check: "Did the application also provide a persistent StreamStore implementation?"
        if_yes:
          choice: "Document replay as durable"
          reason: "The runtime can now persist stream events across reconnects and cold starts."
          example: |
            srv := mcp.NewServer("server", "dev", mcp.WithStreamStore(mcp.NewDynamoStreamStore(db)))
        if_no:
          choice: "Treat the table as infrastructure only"
          reason: "enableStreamTable alone does not make replay durable; the app must still wire mcp.WithStreamStore(...)."
          example: |
            TODO: wire mcp.WithStreamStore(mcp.NewDynamoStreamStore(db)) before claiming durable replay.

  choose_api_source_of_truth:
    question: "What source should drive API docs and migration guidance?"
    decision_tree:
      - condition: "You are documenting exported APIs for Go, TypeScript, or Python."
        check: "Do matching entries exist in api-snapshots/go.txt, api-snapshots/ts.txt, and api-snapshots/py.txt?"
        if_yes:
          choice: "Publish or update docs from the snapshots plus canonical user docs"
          reason: "Snapshots are release-gated drift controls and are safer than inference from internal code paths."
          example: |
            ./scripts/update-api-snapshots.sh
            make rubric
        if_no:
          choice: "Mark the interface UNKNOWN and open a TODO"
          reason: "Missing snapshot evidence must not be documented as fact."
          example: |
            UNKNOWN: exported symbol not yet present in api-snapshots/*.txt

  choose_docs_domain_consolidation:
    question: "How should language-specific docs domains be reflected in canonical docs/?"
    decision_tree:
      - condition: "Useful runtime guidance exists in package-local docs outside the canonical root."
        check: "Is the content user-facing and currently absent from canonical docs/ pages?"
        if_yes:
          choice: "Move or merge it into docs/ fixed files or sanctioned optional surfaces, then keep package-local docs as mirrors"
          reason: "docs/ is the canonical root; package-local docs may remain, but they should not compete as the external source of truth."
          example: |
            TODO: Merge key runtime guidance into docs/getting-started.md, docs/api-reference.md, or docs/testing-guide.md before publishing.
        if_no:
          choice: "Keep the package-local source as a secondary authoring surface with explicit links back to docs/"
          reason: "Package-local docs are useful for language-specific details, but canonical external guidance still belongs under docs/."

  choose_tier:
    question: "Which tier should I use (P0/P1/P2)?"
    decision_tree:
      - condition: "You want the smallest surface area and are building platform features yourself."
        check: "Do you need built-in auth hooks, CORS, or size limits?"
        if_yes:
          choice: "Use TierP1"
          reason: "P1 adds common platform defaults while staying contract-defined."
          example: |
            // Go: apptheory.New(apptheory.WithTier(apptheory.TierP1))
        if_no:
          choice: "Use TierP0"
          reason: "P0 keeps the core minimal for custom runtimes."
      - condition: "You want production hooks (observability, policy, or rate limiting semantics)."
        check: "Is your threat model okay with fail-open rate limiting during dependency outages?"
        if_yes:
          choice: "Use TierP2 + fail-open policy"
          reason: "Improves availability while still enforcing limits when the backend is healthy."
        if_no:
          choice: "Use TierP2 + fail-closed policy"
          reason: "Prefer strict enforcement when limits are a security boundary."

  choose_microvm_surface:
    question: "How should I wire AWS Lambda MicroVM support?"
    decision_tree:
      - condition: "You need first-class Lambda MicroVM lifecycle and controller support."
        check: "Can you use the AppTheory lifecycle adapter, constrained real provider/controller, durable session registry, typed CDK constructs, and conformance harness together?"
        if_yes:
          choice: "Use the corrective M16 MicroVM golden path"
          reason: "M16 evidence covers fixture-backed real operations, provider adapters, protected controller routes, CDK wiring, and local conformance harness readiness for the single AppTheory path."
          example: |
            AppTheoryMicrovmNetworkConnector -> AppTheoryMicrovmImage -> AppTheoryMicrovmController
            MicroVMRealController + TableTheoryMicroVMSessionRegistry
            operations: run/get/list/suspend/resume/terminate/auth-token/shell-auth-token
        if_no:
          choice: "Grow the AppTheory contract before shipping"
          reason: "Raw SDK calls, raw lifecycle hook bypasses, unauthenticated controllers, ad-hoc registries, or non-canonical operation names fragment the contract."
          example: |
            TODO: add fixtures and cross-runtime parity before adding a new MicroVM capability.
      - condition: "You are reviewing v1.14.0/M15 MicroVM wording."
        check: "Does the wording claim complete live first-class support or customer/application proof?"
        if_yes:
          choice: "Correct the claim to foundation-only"
          reason: "M15 was an evidence-bounded foundation; M16 is the corrective real operation path and live proof is outside AppTheory until a consumer lab run exists."
          example: |
            Say: fixture-backed foundation, not live AWS or EqualToAI/Host proof.
        if_no:
          choice: "Keep the evidence boundary explicit"
          reason: "Docs can reference M15 compatibility only when they clearly point new users to the M16 canonical path."
      - condition: "You only have demo, dry-run, or synth-time credentials and placeholder networking."
        check: "Are you using the example or conformance harness only to prove local shape/readiness?"
        if_yes:
          choice: "Keep the claim evidence-bounded"
          reason: "Synth examples and local harness dry-run are not production authentication, live AWS, EqualToAI/Host, or customer readiness proof."
          example: |
            Document this as repo-local runtime/CDK/example/harness evidence, not live deployment proof.
        if_no:
          choice: "Provide production auth, caller-owned network context, and a consumer-run lab harness"
          reason: "Controller routes must stay protected, the network boundary must be explicit, and live application proof belongs to the consumer lab."

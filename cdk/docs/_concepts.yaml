# _concepts.yaml - Machine-readable concept map for AppTheory CDK

concepts:
  apptheory_cdk:
    type: library
    language: typescript
    purpose: "jsii CDK constructs for deploying AppTheory apps with consistent defaults."
    provides:
      - api_gateway_wiring
      - lambda_defaults
      - alarms_and_security_baselines
      - cross_language_constructs
    requires:
      - aws_cdk_v2
      - node_24

  mcp_server_agentcore:
    type: construct
    purpose: "Provision an HTTP API `POST /mcp` endpoint for MCP / Bedrock AgentCore tool calls."
    provides:
      - http_api_v2_route
      - optional_session_table
      - optional_custom_domain
      - optional_stage_logging_throttling
    related_docs:
      - cdk/docs/mcp-server-agentcore.md

  eventbridge_rule_target:
    type: construct
    purpose: "Standard EventBridge rule → Lambda target wiring (schedule XOR eventPattern)."
    related_docs:
      - cdk/docs/eventbridge-rule-target.md

  kinesis_ingestion_constructs:
    type: construct_group
    purpose: "AppTheory Kinesis stream, stream mapping, and CloudWatch Logs destination path."
    provides:
      - encrypted_stream_create_or_wrap
      - lambda_kinesis_event_source_mapping
      - cloudwatch_logs_destination_allowlist
      - partial_batch_failure_default
    related_docs:
      - docs/cdk/kinesis-cloudwatch-logs.md
      - cdk/docs/api-reference.md

  s3_ingest:
    type: construct
    purpose: "Secure S3 ingest bucket with optional EventBridge/SQS notifications (import pipeline front door)."
    related_docs:
      - cdk/docs/s3-ingest.md

  codebuild_job_runner:
    type: construct
    purpose: "Opinionated CodeBuild batch runner for import pipeline steps (safe defaults + logs + optional state change hook)."
    related_docs:
      - cdk/docs/codebuild-job-runner.md

  jobs_table:
    type: construct
    purpose: "Opinionated DynamoDB Jobs table backing the jobs ledger schema (pk/sk + GSIs + TTL)."
    related_docs:
      - cdk/docs/jobs-table.md

  microvm_network_connector:
    type: construct
    purpose: "Lambda MicroVM VPC egress connector backed by AWS::Lambda::NetworkConnector."
    provides:
      - caller_provided_vpc_boundary
      - caller_provided_subnets
      - caller_provided_security_groups
      - optional_operator_role_creation
    related_docs:
      - cdk/docs/microvm-network-connector.md

  microvm_image:
    type: construct
    purpose: "Lambda MicroVM image backed by AWS::Lambda::MicrovmImage."
    provides:
      - code_artifact_uri
      - base_image_version
      - lifecycle_hooks
      - logging_configuration
      - resource_requirements
      - environment_variables
      - network_connector_references
    related_docs:
      - cdk/docs/microvm-image.md
